async function dbLoadProdutos() {
  if (!DB) return null;
  const { data, error } = await DB.from('produtos').select('*').order('criado_em');
  if (error) { console.error(error); return null; }
  return data;
}

async function dbSaveProduto(p) {
  if (!DB) return null;
  const row = {
    nome: p.name, descricao: p.desc, preco: p.price,
    preco_antigo: p.priceOld || null, categoria: p.cat,
    emoji: p.image || p.emoji || '👕',
    cores: (p.colors||[]).map((c,i) => ({hex:c, nome:(p.colorNames||[])[i]||c})),
    tamanhos: p.sizes || [],
    estoque: p.stock || 0,
    destaque: p.badge === 'NOVO' || p.badge === 'DESTAQUE',
    ativo: p.status !== 'out_of_stock',
    foto_url: p.foto || null
  };
  if (p.dbId) {
    const { data, error } = await DB.from('produtos').update(row).eq('id', p.dbId).select();
    if (error) console.error('Update error:', error);
    return data?.[0];
  } else {
    const { data, error } = await DB.from('produtos').insert([row]).select();
    if (error) console.error('Insert error:', error);
    return data?.[0];
  }
}

async function dbDeleteProduto(dbId) {
  if (!DB || !dbId) return;
  await DB.from('produtos').delete().eq('id', dbId);
}

}

async function uploadFotoCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', 'ml_default');
  const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:'POST',body:fd});
  const d = await r.json();
  return d.secure_url || null;
}

const MiniChart=({data,dark,selIdx,onSel})=>{
  const t=T(dark);
  const max=Math.max(...data.map(d=>d.value));
  return(
    <div style={{display:"flex",gap:6,alignItems:"flex-end",height:88}}>
      {data.map((d,i)=>{
        const pct=(d.value/max)*100;
        const active=selIdx===i;
        return(
          <div key={i} onClick={()=>onSel(i)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:"pointer"}}>
            <div style={{width:"100%",height:66,display:"flex",alignItems:"flex-end"}}>
              <div style={{width:"100%",height:`${pct}%`,borderRadius:"5px 5px 0 0",background:active?"linear-gradient(180deg,#a29bfe,#6c5ce7)":(dark?"#252540":"#ede9fe"),transition:"all .25s",minHeight:4}}/>
            </div>
            <span style={{fontSize:9,fontWeight:active?800:500,color:active?t.accent:t.muted}}>{d.day}</span>
          </div>
        );
      })}
    </div>
  );
};

// ── PRODUCTS PAGE ──────────────────────────────────────────
const ProductsPage=({dark,products,onAddEdit,onDelete,onToast})=>{
  const t=T(dark);
  const[search,setSearch]=useState("");
  const[filter,setFilter]=useState("all");
  const[showModal,setShowModal]=useState(false);
  const[editProd,setEditProd]=useState(null);
  const[detailProd,setDetailProd]=useState(null);
  const[loading,setLoading]=useState(true);
  const[sugg,setSugg]=useState([]);
  useEffect(()=>{const id=setTimeout(()=>setLoading(false),700);return()=>clearTimeout(id);},[]);
  useEffect(()=>{setSugg(search.length>1?products.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())).slice(0,4):[]);},[search,products]);
  const filtered=products.filter(p=>(filter==="all"||p.status===filter)&&(p.name.toLowerCase().includes(search.toLowerCase())||p.category.toLowerCase().includes(search.toLowerCase())));
  const handleSave=p=>{onAddEdit(p);onToast(editProd?"✏️ Produto atualizado!":"✅ Produto publicado!");setEditProd(null);};
  return(
    <div>
      <div style={{padding:"16px 16px 10px",position:"relative"}}>
        <div style={{position:"relative"}}>
          <div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)"}}><Ic n="search" size={17} c={t.sub}/></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar produtos…"
            style={{width:"100%",padding:"13px 40px 13px 44px",borderRadius:16,border:`1.5px solid ${t.border}`,background:t.surface,color:t.text,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          {search&&<button onClick={()=>{setSearch("");setSugg([]);}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer"}}><Ic n="x" size={16} c={t.sub}/></button>}
        </div>
        {sugg.length>0&&(
          <div style={{position:"absolute",left:16,right:16,top:"calc(100% - 4px)",background:t.surface,borderRadius:14,border:`1.5px solid ${t.border}`,zIndex:200,overflow:"hidden",boxShadow:"0 12px 40px rgba(0,0,0,.16)"}}>
            {sugg.map(p=>(
              <div key={p.id} onClick={()=>{setDetailProd(p);setSugg([]);setSearch("");}}
                style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",borderBottom:`1px solid ${t.border}`,cursor:"pointer"}}>
                <span style={{fontSize:20}}>{p.image}</span>
                <div><p style={{color:t.text,fontSize:13,fontWeight:700,margin:0}}>{p.name}</p><p style={{color:t.sub,fontSize:11,margin:0}}>{p.category} · {fmt(p.price)}</p></div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{display:"flex",gap:7,padding:"0 16px 14px",overflowX:"auto"}}>
        {[{k:"all",l:"Todos",n:products.length},{k:"active",l:"Ativos",n:products.filter(p=>p.status==="active").length},{k:"low_stock",l:"Baixo",n:products.filter(p=>p.status==="low_stock").length},{k:"out_of_stock",l:"Sem est.",n:products.filter(p=>p.status==="out_of_stock").length}].map(f=>(
          <button key={f.k} onClick={()=>setFilter(f.k)}
            style={{padding:"7px 14px",borderRadius:99,border:`1px solid ${filter===f.k?t.accent:t.border}`,background:filter===f.k?t.accent:t.surface,color:filter===f.k?"#fff":t.sub,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",display:"flex",gap:5,alignItems:"center"}}>
            {f.l} <span style={{background:filter===f.k?"rgba(255,255,255,.25)":t.surfaceAlt,borderRadius:99,padding:"1px 7px",fontSize:10}}>{f.n}</span>
          </button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,padding:"0 16px"}}>
        {loading?Array(6).fill(0).map((_,i)=>(
          <div key={i} style={{background:t.surface,borderRadius:20,padding:12,border:`1px solid ${t.border}`}}>
            <Skel h={110} r={14}/><div style={{marginTop:10}}><Skel h={12} w="80%"/></div><div style={{marginTop:7}}><Skel h={10} w="50%"/></div><div style={{marginTop:8}}><Skel h={17} w="55%"/></div>
          </div>
        )):filtered.map(p=>(
          <div key={p.id} onClick={()=>setDetailProd(p)}
            style={{background:t.surface,borderRadius:20,overflow:"hidden",border:`1px solid ${t.border}`,cursor:"pointer"}}>
            <div style={{height:108,background:`linear-gradient(135deg,${t.aLight},${t.surfaceAlt})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:44,position:"relative"}}>
              {p.image}
              <div style={{position:"absolute",top:7,right:7}}><Badge status={p.status}/></div>
              {!p.synced&&<div style={{position:"absolute",bottom:7,left:7,background:"#fef3c7",borderRadius:99,padding:"2px 7px",display:"flex",gap:3,alignItems:"center"}}><Ic n="alert" size={9} c="#d97706"/><span style={{fontSize:9,color:"#b45309",fontWeight:700}}>Sync</span></div>}
            </div>
            <div style={{padding:"11px 12px 13px"}}>
              <p style={{color:t.text,fontSize:12,fontWeight:700,margin:"0 0 3px",lineHeight:1.3}}>{p.name}</p>
              <p style={{color:t.sub,fontSize:11,margin:"0 0 5px"}}>{p.category}</p>
              <p style={{color:t.accent,fontSize:15,fontWeight:900,margin:"0 0 6px"}}>{fmt(p.price)}</p>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{color:t.sub,fontSize:11,fontWeight:600}}>📦 {p.stock}</span>
                <div style={{display:"flex",gap:3}}>{p.marketplaces.map(m=><MpDot key={m} mp={m} size={11}/>)}</div>
              </div>
            </div>
          </div>
        ))}
      </div>
      {filtered.length===0&&!loading&&<div style={{textAlign:"center",padding:"40px 20px",color:t.sub}}><div style={{fontSize:44,marginBottom:10}}>🔍</div><p style={{fontWeight:700}}>Nenhum produto encontrado</p></div>}
      {detailProd&&<ProductDetail p={detailProd} onClose={()=>setDetailProd(null)} onEdit={p=>{setEditProd(p);setShowModal(true);}} onDelete={id=>{onDelete(id);onToast("🗑️ Removido");}} dark={dark}/>}
      {showModal&&<ProductModal product={editProd} onClose={()=>{setShowModal(false);setEditProd(null);}} onSave={handleSave} dark={dark}/>}
      <button onClick={()=>{setEditProd(null);setShowModal(true);}}
        style={{position:"fixed",bottom:90,right:20,width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,#6c5ce7,#fd79a8)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 8px 28px rgba(108,92,231,.45)",zIndex:100}}>
        <Ic n="plus" size={26} c="#fff"/>
      </button>
    </div>
  );
};

const OrdersPage=({dark,orders})=>{
  const t=T(dark);
  const[tab,setTab]=useState("all");
  const[expanded,setExpanded]=useState(null);
  const tabs=[{k:"all",l:"Todos"},{k:"pending",l:"Pendentes"},{k:"shipped",l:"Enviados"},{k:"delivered",l:"Entregues"}];
  const filtered=tab==="all"?orders:orders.filter(o=>o.status===tab);
  const steps=["pending","shipped","delivered"];
  return(
    <div style={{padding:"16px 16px 8px"}}>
      <div style={{display:"flex",gap:8,marginBottom:14,overflowX:"auto"}}>
        {[{l:"Total",v:orders.length,c:t.accent},{l:"Pendentes",v:orders.filter(o=>o.status==="pending").length,c:"#f59e0b"},{l:"Enviados",v:orders.filter(o=>o.status==="shipped").length,c:"#3b82f6"},{l:"Entregues",v:orders.filter(o=>o.status==="delivered").length,c:"#00c896"}].map((s,i)=>(
          <div key={i} style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:14,padding:"10px 14px",flexShrink:0,textAlign:"center"}}>
            <p style={{color:s.c,fontSize:18,fontWeight:900,margin:"0 0 1px"}}>{s.v}</p>
            <p style={{color:t.sub,fontSize:11,margin:0}}>{s.l}</p>
          </div>
        ))}
      </div>
      <div style={{display:"flex",marginBottom:16,background:t.surfaceAlt,borderRadius:13,padding:4}}>
        {tabs.map(tb=>(
          <button key={tb.k} onClick={()=>setTab(tb.k)}
            style={{flex:1,padding:"8px 2px",borderRadius:10,border:"none",background:tab===tb.k?t.surface:"transparent",color:tab===tb.k?t.text:t.sub,fontSize:11,fontWeight:tab===tb.k?800:600,cursor:"pointer"}}>
            {tb.l}
          </button>
        ))}
      </div>
      {filtered.map((o,i)=>{
        const open=expanded===o.id;
        return(
          <div key={i} onClick={()=>setExpanded(open?null:o.id)}
            style={{background:t.surface,borderRadius:20,padding:"15px",marginBottom:10,border:`1px solid ${t.border}`,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{color:t.accent,fontSize:13,fontWeight:800}}>{o.id}</span>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{color:t.muted,fontSize:12}}>{o.time}</span>
                <div style={{transform:open?"rotate(180deg)":"rotate(0)",transition:"transform .2s"}}><Ic n="chevD" size={15} c={t.sub}/></div>
              </div>
            </div>
            <p style={{color:t.text,fontSize:14,fontWeight:700,margin:"0 0 3px"}}>{o.product}</p>
            <p style={{color:t.sub,fontSize:12,margin:"0 0 9px"}}>👤 {o.customer}</p>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",gap:6}}><Badge status={o.status}/><MpChip mp={o.marketplace}/></div>
              <span style={{color:"#00c896",fontSize:14,fontWeight:900}}>{fmt(o.value)}</span>
            </div>
            <div style={{marginTop:11,display:"flex",gap:4}}>
              {steps.map((s,si)=><div key={s} style={{flex:1,height:4,borderRadius:99,background:steps.indexOf(o.status)>=si?t.accent:t.border}}/>)}
            </div>
            {open&&(
              <div style={{marginTop:13,padding:"11px 13px",background:t.surfaceAlt,borderRadius:13}}>
                <p style={{color:t.text,fontSize:13,fontWeight:600,margin:"0 0 12px"}}>📍 {o.address}</p>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  {steps.map((s,si)=>{
                    const done=steps.indexOf(o.status)>=si;
                    const labels=["Confirmado","Enviado","Entregue"];
                    return(
                      <div key={s} style={{flex:1,textAlign:"center"}}>
                        <div style={{width:26,height:26,borderRadius:"50%",background:done?t.accent:t.border,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 4px"}}>
                          {done?<Ic n="check" size={13} c="#fff"/>:<span style={{fontSize:11,color:t.sub}}>{si+1}</span>}
                        </div>
                        <p style={{color:done?t.accent:t.sub,fontSize:9,fontWeight:700,margin:0}}>{labels[si]}</p>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
};

// ── BULK PRICING PAGE ──────────────────────────────────────
const BulkPricingPage=({dark,products,onSave,onToast})=>{
  const t=T(dark);
  const[selected,setSelected]=useState([]);
  const[action,setAction]=useState("percent");
  const[value,setValue]=useState("");
  const toggleSel=id=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const toggleAll=()=>setSelected(s=>s.length===products.length?[]:products.map(p=>p.id));
  const calcNew=price=>{
    const v=parseFloat(value)||0;
    if(action==="percent")return Math.max(0,price*(1+v/100));
    if(action==="fixed")return Math.max(0,price+v);
    return Math.max(0,v);
  };
  const apply=()=>{
    selected.forEach(id=>{
      const p=products.find(x=>x.id===id);
      if(p)onSave({...p,price:parseFloat(calcNew(p.price).toFixed(2))});
    });
    setSelected([]);setValue("");
    onToast(`💰 ${selected.length} produto(s) atualizados!`);
  };
  return(
    <div style={{padding:"16px 16px 8px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <div>
          <h2 style={{color:t.text,fontSize:18,fontWeight:900,margin:"0 0 2px",fontFamily:"Sora,sans-serif"}}>Preços em Massa</h2>
          <p style={{color:t.sub,fontSize:12,margin:0}}>Ajuste preços de múltiplos produtos</p>
        </div>
        <button onClick={toggleAll} style={{background:t.aLight,border:"none",borderRadius:10,padding:"7px 12px",color:t.accent,fontSize:12,fontWeight:800,cursor:"pointer"}}>
          {selected.length===products.length?"Desmarcar":"Selec. Todos"}
        </button>
      </div>
      <div style={{background:t.surface,borderRadius:20,padding:"16px",border:`1px solid ${t.border}`,marginBottom:16}}>
        <p style={{color:t.sub,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.6,margin:"0 0 12px"}}>Tipo de Ajuste</p>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[["percent","% Porcentagem"],["fixed","+ / - Fixo"],["set","= Definir"]].map(([k,l])=>(
            <button key={k} onClick={()=>setAction(k)}
              style={{flex:1,padding:"9px 4px",borderRadius:12,border:`1.5px solid ${action===k?t.accent:t.border}`,background:action===k?t.aLight:t.input,color:action===k?t.accent:t.sub,fontSize:11,fontWeight:action===k?800:600,cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{position:"relative"}}>
          <input type="number" value={value} onChange={e=>setValue(e.target.value)}
            placeholder={action==="percent"?"Ex: 10 (aumenta 10%)":action==="fixed"?"Ex: -20 (reduz R$20)":"Ex: 99.90"}
            style={{width:"100%",padding:"13px 44px 13px 14px",borderRadius:14,border:`1.5px solid ${t.border}`,background:t.input,color:t.text,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          <span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",color:t.muted,fontSize:14,fontWeight:700}}>{action==="percent"?"%":"R$"}</span>
        </div>
      </div>
      <div style={{marginBottom:80}}>
        {products.map(p=>{
          const sel=selected.includes(p.id);
          const newP=value?calcNew(p.price):null;
          return(
            <div key={p.id} onClick={()=>toggleSel(p.id)}
              style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",marginBottom:8,background:t.surface,borderRadius:18,border:`2px solid ${sel?t.accent:t.border}`,cursor:"pointer"}}>
              <div style={{width:24,height:24,borderRadius:8,border:`2px solid ${sel?t.accent:t.border}`,background:sel?t.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {sel&&<Ic n="check" size={13} c="#fff"/>}
              </div>
              <div style={{width:36,height:36,borderRadius:11,background:t.aLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{p.image}</div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{color:t.text,fontSize:13,fontWeight:700,margin:"0 0 2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</p>
                <p style={{color:t.sub,fontSize:11,margin:0}}>{p.category}</p>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <p style={{color:t.accent,fontSize:14,fontWeight:900,margin:"0 0 2px"}}>{fmt(p.price)}</p>
                {sel&&newP&&<p style={{color:"#00c896",fontSize:11,fontWeight:800,margin:0}}>→ {fmt(newP)}</p>}
              </div>
            </div>
          );
        })}
      </div>
      {selected.length>0&&value&&(
        <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 32px)",maxWidth:398,zIndex:150}}>
          <button onClick={apply}
            style={{width:"100%",padding:"16px",background:"linear-gradient(135deg,#00c896,#00a07a)",border:"none",borderRadius:18,color:"#fff",fontSize:15,fontWeight:800,cursor:"pointer",boxShadow:"0 10px 30px rgba(0,200,150,.4)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <Ic n="check" size={18} c="#fff"/>
            Aplicar em {selected.length} produto{selected.length>1?"s":""}
          </button>
        </div>
      )}
    </div>
  );
};

const ReportsPage=({dark,products,orders,onToast})=>{
  const t=T(dark);
  const[generating,setGenerating]=useState(null);
  const doExport=type=>{
    setGenerating(type);
    setTimeout(()=>{setGenerating(null);onToast(`📄 Relatório exportado!`);},1800);
  };
  const totalRev=orders.reduce((a,o)=>a+o.value,0);
  const reps=[
    {id:"vendas",title:"Relatório de Vendas",desc:"Histórico completo por período",n:"bar",c:"#6c5ce7",size:"~240 KB"},
    {id:"estoque",title:"Inventário de Estoque",desc:"Situação atual dos produtos",n:"pkg",c:"#00c896",size:"~85 KB"},
    {id:"pedidos",title:"Extrato de Pedidos",desc:"Todos os pedidos com status",n:"cart",c:"#f59e0b",size:"~180 KB"},
    {id:"lojas",title:"Performance por Loja",desc:"Comparativo entre marketplaces",n:"store",c:"#fd79a8",size:"~120 KB"},
    {id:"fiscal",title:"Relatório Fiscal NF-e",desc:"Dados para notas fiscais",n:"dollar",c:"#ff4757",size:"~95 KB"},
  ];
  return(
    <div style={{padding:"16px 16px 8px"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        {[{l:"Receita Total",v:fmt(totalRev),n:"dollar",c:"#6c5ce7"},{l:"Total Pedidos",v:orders.length,n:"cart",c:"#00c896"},
          {l:"Produtos Ativos",v:products.filter(p=>p.status==="active").length,n:"pkg",c:"#f59e0b"},{l:"Lojas",v:STORES.length,n:"store",c:"#fd79a8"}].map((s,i)=>(
          <div key={i} style={{background:t.surface,borderRadius:18,padding:"16px 14px",border:`1px solid ${t.border}`}}>
            <div style={{width:34,height:34,borderRadius:10,background:s.c+"18",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:10}}>
              <Ic n={s.n} size={16} c={s.c}/>
            </div>
            <p style={{color:t.text,fontSize:18,fontWeight:900,margin:"0 0 2px"}}>{s.v}</p>
            <p style={{color:t.sub,fontSize:11,margin:0}}>{s.l}</p>
          </div>
        ))}
      </div>
      <p style={{color:t.sub,fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:.6,margin:"0 0 12px 2px"}}>Exportar Relatórios</p>
      {reps.map(r=>(
        <div key={r.id} style={{background:t.surface,borderRadius:20,padding:"15px 16px",marginBottom:10,border:`1px solid ${t.border}`,display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:46,height:46,borderRadius:14,background:r.c+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Ic n={r.n} size={20} c={r.c}/>
          </div>
          <div style={{flex:1}}>
            <p style={{color:t.text,fontSize:14,fontWeight:700,margin:"0 0 3px"}}>{r.title}</p>
            <p style={{color:t.sub,fontSize:12,margin:"0 0 4px"}}>{r.desc}</p>
            <span style={{color:t.muted,fontSize:11}}>{r.size}</span>
          </div>
          <button onClick={()=>doExport(r.title)}
            style={{background:generating===r.title?t.aLight:r.c,border:"none",borderRadius:12,padding:"9px 14px",color:generating===r.title?t.accent:"#fff",fontSize:12,fontWeight:800,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",minWidth:72,gap:5}}>
            {generating===r.title?<Spinner c={t.accent} size={14}/>:<><Ic n="upload" size={13} c="#fff"/>PDF</>}
          </button>
        </div>
      ))}
      <div style={{background:t.surface,borderRadius:20,padding:"16px",border:`1px solid ${t.border}`,marginTop:6}}>
        <p style={{color:t.text,fontSize:14,fontWeight:800,margin:"0 0 14px",fontFamily:"Sora,sans-serif"}}>📋 Resumo Rápido</p>
        {[["Produto mais vendido","Camiseta Dry Fit UV"],["Marketplace líder","Amazon (51%)"],["Horário de pico","20h – 22h"],["Taxa de entrega OK","94.8%"],["Ticket médio",fmt(orders.reduce((a,o)=>a+o.value,0)/Math.max(orders.length,1))]].map(([k,v],i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:i<4?`1px solid ${t.border}`:"none"}}>
            <span style={{color:t.sub,fontSize:13}}>{k}</span>
            <span style={{color:t.text,fontSize:13,fontWeight:700}}>{v}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── GLOBAL SEARCH ──────────────────────────────────────────
const GlobalSearch=({open,onClose,dark,products,orders,onNavigate})=>{
  const t=T(dark);
  const[q,setQ]=useState("");
  const sugg=["Tênis","Eletrônicos","#38289","TechMania"];
  useEffect(()=>{if(open)setQ("");},[open]);
  const results=q.length>1?[
    ...products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||p.category.toLowerCase().includes(q.toLowerCase()))
      .slice(0,4).map(p=>({type:"product",label:p.name,sub:`${p.category} · ${fmt(p.price)}`,icon:p.image,action:()=>{onNavigate("products");onClose();}})),
    ...orders.filter(o=>o.id.includes(q)||o.customer.toLowerCase().includes(q.toLowerCase()))
      .slice(0,3).map(o=>({type:"order",label:`${o.id} — ${o.product}`,sub:`${o.customer} · ${fmt(o.value)}`,icon:"📦",action:()=>{onNavigate("orders");onClose();}})),
    ...STORES.filter(s=>s.name.toLowerCase().includes(q.toLowerCase()))
      .slice(0,2).map(s=>({type:"store",label:s.name,sub:s.marketplace,icon:s.emoji,action:()=>{onNavigate("stores");onClose();}})),
  ]:[];
  if(!open)return null;
  return(
    <div style={{position:"fixed",inset:0,zIndex:900,display:"flex",flexDirection:"column"}}>
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,.7)",backdropFilter:"blur(6px)"}}/>
      <div style={{position:"relative",background:t.surface,borderRadius:"0 0 24px 24px",padding:"54px 16px 16px",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
        <div style={{position:"relative",marginBottom:12}}>
          <div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)"}}><Ic n="search" size={18} c={t.sub}/></div>
          <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar produtos, pedidos, lojas…"
            style={{width:"100%",padding:"14px 42px 14px 46px",borderRadius:16,border:`2px solid ${t.accent}`,background:t.input,color:t.text,fontSize:15,outline:"none",boxSizing:"border-box"}}/>
          {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer"}}><Ic n="x" size={17} c={t.sub}/></button>}
        </div>
        {q.length<2&&(
          <div>
            <p style={{color:t.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.6,marginBottom:8}}>Sugestões</p>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {sugg.map(s=>(
                <button key={s} onClick={()=>setQ(s)} style={{background:t.aLight,border:"none",borderRadius:99,padding:"7px 14px",color:t.accent,fontSize:13,fontWeight:700,cursor:"pointer"}}>{s}</button>
              ))}
            </div>
          </div>
        )}
      </div>
      {results.length>0&&(
        <div style={{position:"relative",background:t.surface,flex:1,overflowY:"auto"}}>
          {["product","order","store"].map(type=>{
            const group=results.filter(r=>r.type===type);
            if(!group.length)return null;
            const labels={product:"Produtos",order:"Pedidos",store:"Lojas"};
            return(
              <div key={type}>
                <p style={{color:t.sub,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.6,padding:"12px 16px 6px",margin:0}}>{labels[type]}</p>
                {group.map((r,i)=>(
                  <div key={i} onClick={r.action} style={{display:"flex",alignItems:"center",gap:14,padding:"13px 16px",borderTop:`1px solid ${t.border}`,cursor:"pointer"}}>
                    <div style={{width:40,height:40,borderRadius:12,background:t.aLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{r.icon}</div>
                    <div style={{flex:1}}>
                      <p style={{color:t.text,fontSize:13,fontWeight:700,margin:"0 0 2px"}}>{r.label}</p>
                      <p style={{color:t.sub,fontSize:12,margin:0}}>{r.sub}</p>
                    </div>
                    <Ic n="chevR" size={16} c={t.muted}/>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}
      {q.length>1&&results.length===0&&(
        <div style={{position:"relative",background:t.surface,padding:"40px 20px",textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:10}}>🔍</div>
          <p style={{color:t.sub,fontSize:14,fontWeight:600}}>Nenhum resultado para "{q}"</p>
        </div>
      )}
    </div>
  );
};

// ── MORE MENU ──────────────────────────────────────────────
const MoreMenu=({open,onClose,dark,onNavigate})=>{
  const t=T(dark);
  const items=[
    {n:"bar",label:"Analytics",sub:"Gráficos e métricas",c:"#6c5ce7",page:"analytics"},
    {n:"dollar",label:"Preços em Massa",sub:"Ajuste múltiplos produtos",c:"#00c896",page:"pricing"},
    {n:"upload",label:"Relatórios",sub:"Exportar dados e NF-e",c:"#f59e0b",page:"reports"},
  ];
  if(!open)return null;
  return(
    <>
      <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",backdropFilter:"blur(4px)",zIndex:599}}/>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:t.surface,zIndex:600,borderRadius:"24px 24px 0 0",padding:"0 16px 40px",animation:"slideUp .25s ease"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 4px"}}>
          <div style={{width:38,height:4,borderRadius:99,background:t.border}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0 16px"}}>
          <h3 style={{color:t.text,fontSize:17,fontWeight:800,margin:0,fontFamily:"Sora,sans-serif"}}>Mais Ferramentas</h3>
          <button onClick={onClose} style={{background:t.surfaceAlt,border:"none",borderRadius:"50%",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
            <Ic n="x" size={16} c={t.sub}/>
          </button>
        </div>
        {items.map(item=>(
          <div key={item.page} onClick={()=>{onNavigate(item.page);onClose();}}
            style={{display:"flex",alignItems:"center",gap:14,padding:"14px",marginBottom:10,background:t.surfaceAlt,borderRadius:18,cursor:"pointer",border:`1px solid ${t.border}`}}>
            <div style={{width:48,height:48,borderRadius:14,background:item.c+"18",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Ic n={item.n} size={22} c={item.c}/>
            </div>
            <div style={{flex:1}}>
              <p style={{color:t.text,fontSize:15,fontWeight:700,margin:"0 0 3px"}}>{item.label}</p>
              <p style={{color:t.sub,fontSize:12,margin:0}}>{item.sub}</p>
            </div>
            <Ic n="chevR" size={17} c={t.muted}/>
          </div>
        ))}
      </div>
    </>
  );
};

// ── ROOT APP ───────────────────────────────────────────────
function App(){
  const[onboarded,setOnboarded]=useState(()=>localStorage.getItem('mh_onboarded')==='1');
  const[loggedIn,setLoggedIn]=useState(()=>localStorage.getItem('mh_logged')==='1');
  const[dark,setDark]=useState(false);
  const[page,setPage]=useState("home");
  const[products,setProducts]=useState(PRODUCTS);
  const[dbLoaded,setDbLoaded]=useState(false);

  useEffect(()=>{
    dbLoadProdutos().then(data=>{
      if(data&&data.length>0){
        setProducts(data.map(dbToProduct));
        setDbLoaded(true);
      }
    });
  },[]);
  const[notifs,setNotifs]=useState(NOTIFS);
  const[notifOpen,setNotifOpen]=useState(false);
  const[searchOpen,setSearchOpen]=useState(false);
  const[moreOpen,setMoreOpen]=useState(false);
  const[toast,setToast]=useState({msg:"",visible:false});

  const showToast=useCallback((msg)=>{
    setToast({msg,visible:true});
    setTimeout(()=>setToast(p=>({...p,visible:false})),2600);
  },[]);

  const handleAddEdit=async(p)=>{
    // Save to Supabase
    const saved = await dbSaveProduto(p);
    if(saved) p = {...p, dbId: saved.id};
    setProducts(prev=>{
    const ex=prev.find(x=>x.id===p.id);
    return ex?prev.map(x=>x.id===p.id?p:x):[p,...prev];
    });
  };

  const t=T(dark);
  const unread=notifs.filter(n=>!n.read).length;
  const nav=[
    {key:"home",n:"home",l:"Home"},
    {key:"products",n:"grid",l:"Produtos"},
    {key:"orders",n:"cart",l:"Pedidos"},
    {key:"stores",n:"store",l:"Lojas"},
    {key:"profile",n:"user",l:"Perfil"},
  ];
  const extraPages=["analytics","pricing","reports"];
  const isExtra=extraPages.includes(page);
  const titles={home:"MarketHub",products:"Produtos",orders:"Pedidos",stores:"Lojas",profile:"Perfil",analytics:"Analytics",pricing:"Preços",reports:"Relatórios"};

  if(!onboarded)return <Onboarding onDone={()=>{localStorage.setItem('mh_onboarded','1');setOnboarded(true);}} dark={dark}/>;
  if(!loggedIn)return <Login onLogin={()=>{localStorage.setItem('mh_logged','1');setLoggedIn(true);}} dark={dark}/>;

  return(
    <div style={{background:t.bg,minHeight:"100vh",fontFamily:"'DM Sans',sans-serif",color:t.text}}>
      <Toast msg={toast.msg} visible={toast.visible}/>

      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:300,background:t.nav,borderBottom:`1px solid ${t.border}`,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",backdropFilter:"blur(20px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:32,height:32,borderRadius:10,background:"linear-gradient(135deg,#6c5ce7,#fd79a8)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ic n="zap" size={16} c="#fff"/>
          </div>
          {isExtra&&<button onClick={()=>setPage("home")} style={{background:"none",border:"none",cursor:"pointer",marginRight:4,display:"flex",alignItems:"center"}}><Ic n="chevL" size={20} c={t.sub}/></button>}
          <span style={{color:t.text,fontSize:17,fontWeight:900,fontFamily:"Sora,sans-serif"}}>{titles[page]}</span>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>setSearchOpen(true)} style={{background:t.surfaceAlt,border:"none",borderRadius:10,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",marginRight:2}}>
            <Ic n="search" size={17} c={t.sub}/>
          </button>
          <button onClick={()=>setNotifOpen(true)} style={{background:"none",border:"none",cursor:"pointer",position:"relative",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ic n="bell" size={20} c={t.sub}/>
            {unread>0&&(
              <div style={{position:"absolute",top:3,right:3,width:16,height:16,borderRadius:"50%",background:"#ff4757",display:"flex",alignItems:"center",justifyContent:"center",border:`2px solid ${t.nav}`}}>
                <span style={{color:"#fff",fontSize:9,fontWeight:900}}>{unread}</span>
              </div>
            )}
          </button>
          <div onClick={()=>setPage("profile")} style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#6c5ce7,#fd79a8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,cursor:"pointer"}}>👤</div>
        </div>
      </div>

      {/* Pages */}
      <div key={page} className="page-enter" style={{paddingBottom:82}}>
        {page==="home"&&<HomePage dark={dark} products={products} orders={ORDERS} onToast={showToast}/>}
        {page==="products"&&<ProductsPage dark={dark} products={products} onAddEdit={handleAddEdit} onDelete={async id=>{
          const p = products.find(x=>x.id===id);
          if(p?.dbId) await dbDeleteProduto(p.dbId);
          setProducts(prev=>prev.filter(x=>x.id!==id));
        }} onToast={showToast}/>}
        {page==="orders"&&<OrdersPage dark={dark} orders={ORDERS}/>}
        {page==="stores"&&<StoresPage dark={dark} onToast={showToast}/>}
        {page==="profile"&&<ProfilePage dark={dark} toggleDark={()=>setDark(d=>!d)} onLogout={()=>setLoggedIn(false)}/>}
        {page==="analytics"&&<AnalyticsPage dark={dark} products={products} orders={ORDERS} onToast={showToast}/>}
        {page==="pricing"&&<BulkPricingPage dark={dark} products={products} onSave={p=>setProducts(prev=>{const ex=prev.find(x=>x.id===p.id);return ex?prev.map(x=>x.id===p.id?p:x):[p,...prev];})} onToast={showToast}/>}
        {page==="reports"&&<ReportsPage dark={dark} products={products} orders={ORDERS} onToast={showToast}/>}
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:t.nav,borderTop:`1px solid ${t.border}`,display:"flex",padding:"7px 0 20px",backdropFilter:"blur(24px)",zIndex:200}}>
        {nav.map(item=>{
          const active=page===item.key;
          return(
            <button key={item.key} onClick={()=>setPage(item.key)}
              style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 0",background:"none",border:"none",cursor:"pointer",position:"relative"}}>
              {active&&<div style={{position:"absolute",top:-7,width:36,height:3,borderRadius:"0 0 99px 99px",background:t.accent}}/>}
              <div style={{width:33,height:33,borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",background:active?t.aLight:"transparent",position:"relative"}}>
                <Ic n={item.n} size={19} c={active?t.accent:t.sub}/>
                {item.key==="orders"&&ORDERS.filter(o=>o.status==="pending").length>0&&(
                  <div style={{position:"absolute",top:2,right:2,width:7,height:7,borderRadius:"50%",background:"#ff4757",border:`2px solid ${t.nav}`}}/>
                )}
              </div>
              <span style={{fontSize:9,fontWeight:active?800:500,color:active?t.accent:t.sub}}>{item.l}</span>
            </button>
          );
        })}
        <button onClick={()=>setMoreOpen(true)}
          style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 0",background:"none",border:"none",cursor:"pointer",position:"relative"}}>
          {isExtra&&<div style={{position:"absolute",top:-7,width:36,height:3,borderRadius:"0 0 99px 99px",background:t.accent}}/>}
          <div style={{width:33,height:33,borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",background:isExtra?t.aLight:"transparent"}}>
            <Ic n="more" size={19} c={isExtra?t.accent:t.sub}/>
          </div>
          <span style={{fontSize:9,fontWeight:isExtra?800:500,color:isExtra?t.accent:t.sub}}>Mais</span>
        </button>
      </div>

      <GlobalSearch open={searchOpen} onClose={()=>setSearchOpen(false)} dark={dark} products={products} orders={ORDERS} onNavigate={setPage}/>
      <MoreMenu open={moreOpen} onClose={()=>setMoreOpen(false)} dark={dark} onNavigate={setPage}/>
      <NotifDrawer open={notifOpen} onClose={()=>setNotifOpen(false)} dark={dark} notifs={notifs}
        onMarkAll={()=>{setNotifs(n=>n.map(x=>({...x,read:true})));showToast("✅ Todas lidas");}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
